<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth System Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#000,#0f172a,#000);
color:#fff;overflow:hidden;
}

/* Background animation */
.bg{
position:absolute;width:600px;height:600px;
background:#9333ea;filter:blur(120px);
opacity:.2;border-radius:50%;
animation:move 10s infinite alternate;
}
@keyframes move{
0%{transform:translate(-100px,-100px)}
100%{transform:translate(200px,200px)}
}

/* Card */
.card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,.08);
padding:25px;border-radius:20px;
width:340px;box-shadow:0 10px 30px rgba(0,0,0,.5);
z-index:2;animation:fade .6s ease;
}
@keyframes fade{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}
}

/* Tabs */
.tabs{display:flex;justify-content:space-between;margin-bottom:15px}
.tabs button{
background:none;border:none;color:#fff;
cursor:pointer;font-weight:600;
}

/* Inputs */
input{
width:100%;padding:10px;margin-top:8px;
border-radius:10px;border:none;
outline:none;background:rgba(255,255,255,.15);
color:#fff;
}

/* Buttons */
.btn{
width:100%;padding:10px;margin-top:12px;
border-radius:10px;border:none;
cursor:pointer;background:#7c3aed;color:#fff;
}
.btn:hover{background:#6d28d9}

.google{
background:#fff;color:#000
}

.center{text-align:center;margin-top:10px}
.error{color:#ff6b6b;font-size:12px;margin-top:5px}

.back{
margin-top:10px;
cursor:pointer;
font-size:13px;
opacity:.7;
}

/* Loader */
.loader{
display:none;
text-align:center;
margin-top:10px;
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="tabs">
<button onclick="switchTab('login')">Login</button>
<button onclick="switchTab('signup')">Signup</button>
</div>

<!-- LOGIN -->
<div id="login">
<input placeholder="Email">
<input type="password" placeholder="Password">

<button class="btn" onclick="playSound()">Login</button>

<div class="center">OR</div>

<button class="btn google">Continue with Google</button>

<p class="back" onclick="switchTab('signup')">Don't have account? Sign up</p>
</div>

<!-- SIGNUP -->
<div id="signup" style="display:none;">

<!-- STEP 1 -->
<div id="step1">
<input placeholder="Username">
<input type="date">

<input id="location" readonly placeholder="Location permission required">

<p class="error" id="locError"></p>
<p class="loader" id="loader">Detecting location...</p>

<button class="btn" onclick="nextStep()">Continue</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<input placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<input type="password" id="cpass" placeholder="Confirm Password">

<p class="error" id="passError"></p>

<button class="btn" onclick="register()">Register</button>

<div class="center">OR</div>

<button class="btn google">Continue with Google</button>

<p class="back" onclick="goBack()">⬅ Back</p>
</div>

<p class="back" onclick="switchTab('login')">Already have account? Login</p>

</div>

</div>

<script>

let locationAllowed = false;

/* Tabs */
function switchTab(tab){
document.getElementById("login").style.display = tab==="login"?"block":"none";
document.getElementById("signup").style.display = tab==="signup"?"block":"none";

if(tab==="signup"){
requestLocation(); // ask immediately
}
}

/* Sound */
function playSound(){
new Audio("https://www.fesliyanstudios.com/play-mp3/387").play();
}

/* 🔥 Force Location Permission */
function requestLocation(){

document.getElementById("loader").style.display="block";

navigator.geolocation.getCurrentPosition(
(pos)=>{
locationAllowed=true;

document.getElementById("location").value =
"Lat:"+pos.coords.latitude.toFixed(3)+
" Lon:"+pos.coords.longitude.toFixed(3);

document.getElementById("locError").innerText="";
document.getElementById("loader").style.display="none";
},
()=>{
locationAllowed=false;

document.getElementById("locError").innerText =
"⚠ Location required! Allow to continue.";

document.getElementById("loader").style.display="none";

/* If blocked permanently */
if(navigator.permissions){
navigator.permissions.query({name:"geolocation"}).then((res)=>{
if(res.state==="denied"){
document.getElementById("locError").innerText =
"⚠ Location blocked. Enable it from browser settings.";
}
});
}
}
);
}

/* Continue */
function nextStep(){

if(!locationAllowed){
requestLocation(); // 🔁 ask again every click
return;
}

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";
}

/* Back */
function goBack(){
document.getElementById("step1").style.display="block";
document.getElementById("step2").style.display="none";
}

/* Register validation */
function register(){

let p=document.getElementById("pass").value;
let c=document.getElementById("cpass").value;

if(p!==c){
document.getElementById("passError").innerText="❌ Passwords do not match";
return;
}

alert("Account Created Successfully 🚀");
}

</script>

</body>
</html>
