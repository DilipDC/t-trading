<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TradingFast | Payment - Deposit & Withdraw (Timing + Daily Limits)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            color: #eef2ff;
            padding: 24px;
            transition: background 0.3s, color 0.3s;
        }
        body.light {
            background: #f5f7fb;
            color: #1e293b;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .payment-card {
            background: #151b26;
            border-radius: 48px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 1px solid #2a2e3a;
        }
        body.light .payment-card {
            background: white;
            border-color: #edf2f7;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        .balance-section {
            text-align: center;
            padding: 24px;
            background: #1f2937;
            border-radius: 40px;
            margin-bottom: 32px;
        }
        body.light .balance-section {
            background: #f8fafc;
        }
        .balance-label {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: 800;
            color: #6ee7b7;
        }
        body.light .balance-amount {
            color: #2e7d32;
        }
        .info-bar {
            background: #1f2a3a;
            border-radius: 32px;
            padding: 14px 20px;
            margin-bottom: 24px;
            font-size: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .info-bar:hover {
            background: #2a3446;
        }
        body.light .info-bar {
            background: #eef2ff;
            color: #1e293b;
        }
        body.light .info-bar:hover {
            background: #e2e8f0;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-item i {
            color: #6ee7b7;
        }
        body.light .info-item i {
            color: #2e7d32;
        }
        .test-badge {
            background: #f59e0b;
            color: #0a0c12;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
        }
        .action-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .deposit-btn {
            background: #2e7d32;
            color: white;
        }
        .deposit-btn:hover {
            background: #1e5a2a;
            transform: scale(1.02);
        }
        .withdraw-btn {
            background: #1f2937;
            color: #6ee7b7;
            border: 1px solid #2e7d32;
        }
        .withdraw-btn:hover {
            background: #2e7d32;
            color: white;
        }
        body.light .withdraw-btn {
            background: #e2e8f0;
            color: #2e7d32;
        }
        body.light .withdraw-btn:hover {
            background: #2e7d32;
            color: white;
        }
        .transactions-section {
            margin-top: 24px;
        }
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .transaction-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2a2e3a;
            flex-wrap: wrap;
            gap: 10px;
        }
        body.light .transaction-item {
            border-color: #edf2f7;
        }
        .transaction-type {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .type-badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .type-deposit { background: #1e3a2f; color: #6ee7b7; }
        .type-withdraw { background: #3e1a1a; color: #fca5a5; }
        body.light .type-deposit { background: #e0f2e9; color: #2e7d32; }
        body.light .type-withdraw { background: #ffe6e5; color: #c62828; }
        .transaction-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 40px;
        }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-approved { background: #10b98120; color: #10b981; }
        .status-rejected { background: #ef444420; color: #ef4444; }
        .dark-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1f2937;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            color: #facc15;
            z-index: 100;
        }
        body.light .dark-toggle {
            background: white;
            color: #4a5568;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #6ee7b7;
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        body.light .back-link {
            color: #4CAF50;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #151b26;
            border-radius: 48px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            position: relative;
            border: 1px solid #2a2e3a;
            max-height: 90vh;
            overflow-y: auto;
        }
        body.light .modal-content {
            background: white;
            border-color: #edf2f7;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h3 {
            font-size: 1.5rem;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #9ca3af;
        }
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .amount-chip {
            background: #1f2937;
            border: 1px solid #2a2e3a;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        body.light .amount-chip {
            background: #f8fafc;
            border-color: #e2e8f0;
        }
        .amount-chip:hover {
            background: #2e7d32;
            color: white;
            border-color: #2e7d32;
        }
        .custom-amount {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #2a2e3a;
            background: #1f2937;
            color: #eef2ff;
            font-size: 1rem;
            margin: 15px 0;
        }
        body.light .custom-amount {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #1e293b;
        }
        .error-message {
            color: #fca5a5;
            font-size: 0.8rem;
            margin: -10px 0 15px 0;
            display: none;
        }
        body.light .error-message {
            color: #c62828;
        }
        .upi-input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: 1px solid #2a2e3a;
            background: #1f2937;
            color: #eef2ff;
            font-size: 1rem;
            margin: 10px 0;
        }
        body.light .upi-input {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #1e293b;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            background: #2e7d32;
            color: white;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .qr-container {
            text-align: center;
            padding: 20px;
        }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #1f2937;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            flex-direction: column;
            gap: 15px;
        }
        body.light .qr-placeholder {
            background: #f8fafc;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a2e3a;
            border-top: 3px solid #6ee7b7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .timer {
            text-align: center;
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #f59e0b;
        }
        .warning-text {
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 15px;
        }
        body.light .warning-text {
            color: #c62828;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e7d32;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 2000;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @media (max-width: 600px) {
            body { padding: 16px; }
            .payment-card { padding: 20px; }
            .balance-amount { font-size: 2rem; }
            .action-buttons { gap: 12px; }
            .action-btn { padding: 14px; font-size: 1rem; }
            .info-bar { flex-direction: column; align-items: flex-start; }
            .amount-grid { gap: 8px; }
            .amount-chip { padding: 10px; }
            .modal-content { padding: 24px; }
        }
    </style>
</head>
<body>
    <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-sun"></i> Light Mode</button>
    <div class="container">
        <div class="payment-card">
            <div class="balance-section">
                <div class="balance-label"><i class="fas fa-wallet"></i> Available Balance</div>
                <div class="balance-amount">₹<span id="balanceAmount">10000.00</span></div>
            </div>
            
            <!-- Info Bar (double-click to enable test mode +3h) -->
            <div class="info-bar" id="testInfoBar">
                <div class="info-item"><i class="fas fa-clock"></i> Deposit/Withdraw: 09:00 AM - 06:00 PM (IST)</div>
                <div class="info-item"><i class="fas fa-calendar-day"></i> Daily limit: 1 Deposit & 1 Withdrawal per day</div>
                <div id="testModeBadge" style="display: none;" class="test-badge"><i class="fas fa-flask"></i> TEST +3h</div>
            </div>

            <div class="action-buttons">
                <button id="depositBtn" class="action-btn deposit-btn"><i class="fas fa-download"></i> Deposit</button>
                <button id="withdrawBtn" class="action-btn withdraw-btn"><i class="fas fa-upload"></i> Withdraw</button>
            </div>
            
            <div class="transactions-section">
                <div class="section-title">
                    <i class="fas fa-history"></i> Recent Transactions
                </div>
                <div id="transactionList" class="transaction-list">
                    <div style="text-align:center; padding:20px;">No transactions yet</div>
                </div>
            </div>
            
            <a href="trading.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Trading</a>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-download"></i> Deposit Money</h3>
                <button class="close-modal" id="closeDepositModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div id="depositContent"></div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-upload"></i> Withdraw Money</h3>
                <button class="close-modal" id="closeWithdrawModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div id="withdrawContent"></div>
        </div>
    </div>

    <script>
        // ======================= TEST MODE: +3 HOUR OFFSET =======================
        let testOffsetHours = 0;
        const TEST_OFFSET_KEY = 'testTimeOffsetHours';

        function loadTestMode() {
            const saved = localStorage.getItem(TEST_OFFSET_KEY);
            if (saved && !isNaN(parseInt(saved))) {
                testOffsetHours = parseInt(saved);
            } else {
                testOffsetHours = 0;
            }
            updateTestBadge();
        }
        
        function updateTestBadge() {
            const badge = document.getElementById('testModeBadge');
            if (testOffsetHours !== 0) {
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }
        }
        
        function setTestOffset(offsetHours) {
            testOffsetHours = offsetHours;
            localStorage.setItem(TEST_OFFSET_KEY, testOffsetHours);
            updateTestBadge();
            showToast(`Test mode: time ${offsetHours === 0 ? 'disabled' : `+${offsetHours}h active`}`, false);
        }
        
        // Get current time with test offset (for simulating different hours)
        function getCurrentTestTime() {
            const now = new Date();
            if (testOffsetHours === 0) return now;
            const offsetMs = testOffsetHours * 60 * 60 * 1000;
            return new Date(now.getTime() + offsetMs);
        }

        // ========== CONFIGURATION ==========
        const ALLOWED_START_HOUR = 9;    // 9 AM
        const ALLOWED_END_HOUR = 18;     // 6 PM (18:00)
        
        // User data
        let userBalance = 10000;
        let transactions = [];
        let activeDepositTimer = null;
        let activeWithdrawTimer = null;
        let depositTimeoutId = null;
        let withdrawTimeoutId = null;
        
        // Lock variables (prevent parallel attempts & daily limit bypass)
        let currentDepositLock = null;      // stores date string YYYY-MM-DD when deposit flow active
        let currentWithdrawLock = null;     // stores date string for withdraw flow active

        // ========== Helper Functions ==========
        function getTodayDateStr() {
            const testNow = getCurrentTestTime();
            return testNow.toISOString().slice(0,10);
        }

        // Check if current time (with test offset) is within allowed window
        function isWithinTimeWindow() {
            const testNow = getCurrentTestTime();
            const hour = testNow.getHours();
            const minute = testNow.getMinutes();
            const currentMinutes = hour * 60 + minute;
            const startMinutes = ALLOWED_START_HOUR * 60;
            const endMinutes = ALLOWED_END_HOUR * 60;
            return (currentMinutes >= startMinutes && currentMinutes <= endMinutes);
        }

        // Check if deposit allowed today: no existing deposit transaction today AND no active lock
        function isDepositAllowedToday() {
            const today = getTodayDateStr();
            // Check transaction list for any deposit (any status) created today
            const hasDepositToday = transactions.some(tx => tx.type === 'deposit' && tx.date.startsWith(today));
            if (hasDepositToday) return false;
            if (currentDepositLock === today) return false;
            return true;
        }

        function isWithdrawAllowedToday() {
            const today = getTodayDateStr();
            const hasWithdrawToday = transactions.some(tx => tx.type === 'withdraw' && tx.date.startsWith(today));
            if (hasWithdrawToday) return false;
            if (currentWithdrawLock === today) return false;
            return true;
        }

        function releaseDepositLock() { currentDepositLock = null; }
        function setDepositLock() { currentDepositLock = getTodayDateStr(); }
        function releaseWithdrawLock() { currentWithdrawLock = null; }
        function setWithdrawLock() { currentWithdrawLock = getTodayDateStr(); }

        function canProceedDeposit() {
            if (!isWithinTimeWindow()) {
                const testNow = getCurrentTestTime();
                const hour = testNow.getHours();
                showToast(`Deposit allowed only between 9:00 AM - 6:00 PM (current simulated hour: ${hour}:00). Double-click info bar to test +3h offset.`, true);
                return false;
            }
            if (!isDepositAllowedToday()) {
                showToast('Daily deposit limit reached (1 deposit per day). Please try again tomorrow.', true);
                return false;
            }
            return true;
        }

        function canProceedWithdraw() {
            if (!isWithinTimeWindow()) {
                const testNow = getCurrentTestTime();
                const hour = testNow.getHours();
                showToast(`Withdrawal allowed only between 9:00 AM - 6:00 PM (current simulated hour: ${hour}:00). Double-click info bar to test +3h offset.`, true);
                return false;
            }
            if (!isWithdrawAllowedToday()) {
                showToast('Daily withdrawal limit reached (1 withdrawal per day). Please try again tomorrow.', true);
                return false;
            }
            return true;
        }

        // Load & Save Data
        function loadData() {
            const savedBalance = localStorage.getItem('userBalance');
            if (savedBalance) userBalance = parseFloat(savedBalance);
            const savedTransactions = localStorage.getItem('paymentTransactions');
            if (savedTransactions) transactions = JSON.parse(savedTransactions);
            updateBalanceUI();
            renderTransactions();
        }
        
        function saveData() {
            localStorage.setItem('userBalance', userBalance);
            localStorage.setItem('paymentTransactions', JSON.stringify(transactions));
        }
        
        function updateBalanceUI() {
            document.getElementById('balanceAmount').innerText = userBalance.toFixed(2);
            saveData();
        }
        
        function showToast(message, isError = false) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#c62828' : '#2e7d32';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function renderTransactions() {
            const container = document.getElementById('transactionList');
            if (transactions.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">No transactions yet</div>';
                return;
            }
            container.innerHTML = transactions.slice(0, 10).map(t => {
                const typeClass = t.type === 'deposit' ? 'type-deposit' : 'type-withdraw';
                const typeIcon = t.type === 'deposit' ? '<i class="fas fa-arrow-down"></i>' : '<i class="fas fa-arrow-up"></i>';
                let statusClass = '';
                if (t.status === 'pending') statusClass = 'status-pending';
                else if (t.status === 'approved') statusClass = 'status-approved';
                else statusClass = 'status-rejected';
                
                let statusText = t.status;
                if (t.status === 'pending') statusText = 'Pending';
                else if (t.status === 'approved') statusText = 'Approved';
                else statusText = 'Failed';
                
                return `
                    <div class="transaction-item">
                        <div class="transaction-type">
                            <span class="type-badge ${typeClass}">${typeIcon} ${t.type.toUpperCase()}</span>
                            <span>₹${t.amount}</span>
                        </div>
                        <div>
                            <span class="transaction-status ${statusClass}">${statusText}</span>
                        </div>
                        <div style="font-size:0.7rem; color:#6b7280;">${new Date(t.date).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }
        
        function addTransaction(type, amount, status, details = {}) {
            const transaction = {
                id: Date.now(),
                type: type,
                amount: amount,
                status: status,
                date: new Date().toISOString(),
                details: details
            };
            transactions.unshift(transaction);
            if (transactions.length > 50) transactions.pop();
            saveData();
            renderTransactions();
            return transaction;
        }
        
        function sendToAdmin(requestType, data) {
            console.log(`Request sent to admin: ${requestType}`, data);
            const adminRequests = JSON.parse(localStorage.getItem('adminPaymentRequests') || '[]');
            adminRequests.push({
                id: Date.now(),
                type: requestType,
                data: data,
                timestamp: new Date().toISOString(),
                status: 'pending'
            });
            localStorage.setItem('adminPaymentRequests', JSON.stringify(adminRequests));
        }
        
        function validateAmount(amount) {
            if (isNaN(amount) || amount === null || amount === '') return false;
            const num = parseFloat(amount);
            if (!Number.isInteger(num)) return false;
            if (num < 100) return false;
            return true;
        }
        
        // ========== DEPOSIT FLOW ==========
        let depositAmount = 0;
        
        function showDepositAmountScreen() {
            const container = document.getElementById('depositContent');
            container.innerHTML = `
                <div>
                    <p style="margin-bottom:15px;">Select deposit amount (Minimum ₹100)</p>
                    <div class="amount-grid">
                        <div class="amount-chip" data-amount="100">₹100</div>
                        <div class="amount-chip" data-amount="200">₹200</div>
                        <div class="amount-chip" data-amount="300">₹300</div>
                    </div>
                    <input type="number" id="customAmount" class="custom-amount" placeholder="Or enter custom amount (Min ₹100)" min="100" step="1">
                    <div id="depositError" class="error-message"></div>
                    <button id="proceedDepositBtn" class="submit-btn">Proceed to QR</button>
                </div>
            `;
            
            document.querySelectorAll('.amount-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const amount = parseInt(chip.dataset.amount);
                    document.getElementById('customAmount').value = amount;
                    document.getElementById('depositError').style.display = 'none';
                });
            });
            
            document.getElementById('proceedDepositBtn').addEventListener('click', () => {
                if (!canProceedDeposit()) { closeDepositModal(); return; }
                let amount = parseInt(document.getElementById('customAmount').value);
                const errorDiv = document.getElementById('depositError');
                if (isNaN(amount) || amount < 100) {
                    errorDiv.textContent = 'Minimum deposit amount is ₹100';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (!Number.isInteger(amount)) {
                    errorDiv.textContent = 'Amount must be a whole number';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (amount > 100000) {
                    errorDiv.textContent = 'Maximum deposit amount is ₹100,000';
                    errorDiv.style.display = 'block';
                    return;
                }
                depositAmount = amount;
                setDepositLock();
                showQRLoadingScreen();
            });
        }
        
        function showQRLoadingScreen() {
            const container = document.getElementById('depositContent');
            let timeLeft = 300;
            let timerInterval;
            container.innerHTML = `
                <div class="qr-container">
                    <div id="qrPlaceholder" class="qr-placeholder">
                        <div class="loading-spinner"></div>
                        <p>Waiting for QR from admin...</p>
                        <p style="font-size:0.8rem;">Request sent to admin</p>
                    </div>
                    <div class="timer">Time remaining: <span id="timerDisplay">05:00</span></div>
                    <button id="cancelDepositBtn" class="submit-btn" style="background:#c62828; margin-top:15px;">Cancel Request</button>
                    <p class="warning-text"><i class="fas fa-info-circle"></i> QR will be sent by admin. Please wait...</p>
                </div>
            `;
            sendToAdmin('deposit', { amount: depositAmount });
            function updateTimer() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    clearTimeout(depositTimeoutId);
                    showPaymentFailed('Payment timeout. Please try again.');
                }
                timeLeft--;
            }
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
            activeDepositTimer = timerInterval;
            depositTimeoutId = setTimeout(() => {
                if (document.getElementById('qrPlaceholder')) {
                    clearInterval(timerInterval);
                    showQRCodeScreen();
                }
            }, Math.random() * 5000 + 3000);
            
            document.getElementById('cancelDepositBtn').addEventListener('click', () => {
                clearInterval(timerInterval);
                clearTimeout(depositTimeoutId);
                sendToAdmin('deposit_cancelled', { amount: depositAmount, reason: 'User cancelled' });
                addTransaction('deposit', depositAmount, 'rejected', { reason: 'Cancelled by user' });
                releaseDepositLock();
                closeDepositModal();
                showToast('Deposit cancelled');
            });
        }
        
        function showQRCodeScreen() {
            const container = document.getElementById('depositContent');
            container.innerHTML = `
                <div class="qr-container">
                    <div class="qr-placeholder" style="padding:20px;">
                        <i class="fas fa-qrcode" style="font-size: 80px; color: #6ee7b7;"></i>
                        <p><strong>Scan QR Code to Pay</strong></p>
                        <p style="font-size:1.2rem; font-weight:700;">₹${depositAmount}</p>
                        <p style="font-size:0.8rem;">UPI ID: tradingfast@okhdfcbank</p>
                    </div>
                    <p style="margin-top:15px;">After payment, click "I have paid"</p>
                    <button id="confirmPaidBtn" class="submit-btn">I have paid</button>
                    <button id="cancelPaymentBtn" class="submit-btn" style="background:#6b7280; margin-top:10px;">Cancel</button>
                </div>
            `;
            document.getElementById('confirmPaidBtn').addEventListener('click', () => {
                addTransaction('deposit', depositAmount, 'pending', { upi_id: 'tradingfast@okhdfcbank' });
                sendToAdmin('deposit_confirmed', { amount: depositAmount, userConfirmed: true });
                closeDepositModal();
                showToast(`Deposit request of ₹${depositAmount} sent for admin approval`);
            });
            document.getElementById('cancelPaymentBtn').addEventListener('click', () => {
                sendToAdmin('deposit_cancelled', { amount: depositAmount, reason: 'User cancelled after QR' });
                releaseDepositLock();
                closeDepositModal();
                showToast('Deposit cancelled');
            });
        }
        
        function showPaymentFailed(message) {
            const container = document.getElementById('depositContent');
            container.innerHTML = `
                <div class="qr-container">
                    <i class="fas fa-times-circle" style="font-size: 64px; color: #c62828;"></i>
                    <h3 style="margin-top:15px;">Payment Failed!</h3>
                    <p>${message}</p>
                    <button id="retryDepositBtn" class="submit-btn" style="margin-top:20px;">Try Again</button>
                </div>
            `;
            addTransaction('deposit', depositAmount, 'rejected', { reason: message });
            releaseDepositLock();
            document.getElementById('retryDepositBtn').addEventListener('click', () => { showDepositAmountScreen(); });
        }
        
        // ========== WITHDRAW FLOW ==========
        let withdrawAmount = 0;
        
        function showWithdrawForm() {
            if (!canProceedWithdraw()) { closeWithdrawModal(); return; }
            const container = document.getElementById('withdrawContent');
            container.innerHTML = `
                <div>
                    <p style="margin-bottom:15px;">Enter withdrawal details (Minimum ₹100) - Only 1 withdrawal/day</p>
                    <input type="text" id="upiId" class="upi-input" placeholder="UPI ID (e.g., username@okhdfcbank)" autocomplete="off">
                    <input type="text" id="upiName" class="upi-input" placeholder="Account Holder Name" autocomplete="off">
                    <div class="amount-grid">
                        <div class="amount-chip" data-amount="100">₹100</div>
                        <div class="amount-chip" data-amount="200">₹200</div>
                        <div class="amount-chip" data-amount="300">₹300</div>
                    </div>
                    <input type="number" id="customWithdrawAmount" class="custom-amount" placeholder="Or enter custom amount (Min ₹100)" min="100" step="1">
                    <div id="withdrawError" class="error-message"></div>
                    <button id="proceedWithdrawBtn" class="submit-btn">Request Withdrawal</button>
                </div>
            `;
            document.querySelectorAll('.amount-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const amount = parseInt(chip.dataset.amount);
                    document.getElementById('customWithdrawAmount').value = amount;
                    document.getElementById('withdrawError').style.display = 'none';
                });
            });
            document.getElementById('proceedWithdrawBtn').addEventListener('click', () => {
                if (!canProceedWithdraw()) { closeWithdrawModal(); return; }
                const upiId = document.getElementById('upiId').value.trim();
                const upiName = document.getElementById('upiName').value.trim();
                let amount = parseInt(document.getElementById('customWithdrawAmount').value);
                const errorDiv = document.getElementById('withdrawError');
                if (!upiId) { errorDiv.textContent = 'UPI ID is required'; errorDiv.style.display = 'block'; return; }
                if (!upiName) { errorDiv.textContent = 'Account holder name is required'; errorDiv.style.display = 'block'; return; }
                if (isNaN(amount) || amount < 100) { errorDiv.textContent = 'Minimum withdrawal amount is ₹100'; errorDiv.style.display = 'block'; return; }
                if (!Number.isInteger(amount)) { errorDiv.textContent = 'Amount must be a whole number'; errorDiv.style.display = 'block'; return; }
                if (amount > userBalance) { errorDiv.textContent = `Insufficient balance. Available: ₹${userBalance}`; errorDiv.style.display = 'block'; return; }
                if (amount > 50000) { errorDiv.textContent = 'Maximum withdrawal per request is ₹50,000'; errorDiv.style.display = 'block'; return; }
                withdrawAmount = amount;
                setWithdrawLock();
                showWithdrawLoadingScreen(upiId, upiName);
            });
        }
        
        function showWithdrawLoadingScreen(upiId, upiName) {
            const container = document.getElementById('withdrawContent');
            let timeLeft = 300;
            let timerInterval;
            container.innerHTML = `
                <div class="qr-container">
                    <div class="qr-placeholder">
                        <div class="loading-spinner"></div>
                        <p>Processing withdrawal request...</p>
                        <p style="font-size:0.8rem;">Request sent to admin</p>
                    </div>
                    <div class="timer">Time remaining: <span id="timerDisplay">05:00</span></div>
                    <button id="cancelWithdrawBtn" class="submit-btn" style="background:#c62828; margin-top:15px;">Cancel Request</button>
                </div>
            `;
            sendToAdmin('withdraw', { amount: withdrawAmount, upi_id: upiId, upi_name: upiName });
            addTransaction('withdraw', withdrawAmount, 'pending', { upi_id: upiId, upi_name: upiName });
            function updateTimer() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                if (document.getElementById('timerDisplay')) document.getElementById('timerDisplay').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); clearTimeout(withdrawTimeoutId); showWithdrawFailed('Withdrawal timeout.'); }
                timeLeft--;
            }
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
            activeWithdrawTimer = timerInterval;
            withdrawTimeoutId = setTimeout(() => {
                clearInterval(timerInterval);
                const isApproved = Math.random() > 0.2;
                if (isApproved) {
                    userBalance -= withdrawAmount;
                    updateBalanceUI();
                    const pendingTx = transactions.find(t => t.type === 'withdraw' && t.status === 'pending' && t.amount === withdrawAmount);
                    if (pendingTx) pendingTx.status = 'approved';
                    saveData(); renderTransactions();
                    closeWithdrawModal();
                    showToast(`Withdrawal of ₹${withdrawAmount} approved!`);
                } else { showWithdrawFailed('Admin rejected the withdrawal request'); }
            }, Math.random() * 5000 + 3000);
            document.getElementById('cancelWithdrawBtn').addEventListener('click', () => {
                clearInterval(timerInterval); clearTimeout(withdrawTimeoutId);
                sendToAdmin('withdraw_cancelled', { amount: withdrawAmount, reason: 'User cancelled' });
                const pendingTx = transactions.find(t => t.type === 'withdraw' && t.status === 'pending' && t.amount === withdrawAmount);
                if (pendingTx) pendingTx.status = 'rejected';
                saveData(); renderTransactions();
                releaseWithdrawLock();
                closeWithdrawModal();
                showToast('Withdrawal cancelled');
            });
        }
        
        function showWithdrawFailed(message) {
            const container = document.getElementById('withdrawContent');
            container.innerHTML = `<div class="qr-container"><i class="fas fa-times-circle" style="font-size: 64px; color: #c62828;"></i><h3>Withdrawal Failed!</h3><p>${message}</p><button id="retryWithdrawBtn" class="submit-btn">Try Again</button></div>`;
            const pendingTx = transactions.find(t => t.type === 'withdraw' && t.status === 'pending');
            if (pendingTx) pendingTx.status = 'rejected';
            saveData(); renderTransactions();
            releaseWithdrawLock();
            document.getElementById('retryWithdrawBtn').addEventListener('click', () => { showWithdrawForm(); });
        }
        
        // Modal handlers
        function openDepositModal() { if (!canProceedDeposit()) return; document.getElementById('depositModal').classList.add('active'); showDepositAmountScreen(); }
        function closeDepositModal() { document.getElementById('depositModal').classList.remove('active'); if (activeDepositTimer) clearInterval(activeDepositTimer); if (depositTimeoutId) clearTimeout(depositTimeoutId); releaseDepositLock(); }
        function openWithdrawModal() { if (!canProceedWithdraw()) return; document.getElementById('withdrawModal').classList.add('active'); showWithdrawForm(); }
        function closeWithdrawModal() { document.getElementById('withdrawModal').classList.remove('active'); if (activeWithdrawTimer) clearInterval(activeWithdrawTimer); if (withdrawTimeoutId) clearTimeout(withdrawTimeoutId); releaseWithdrawLock(); }
        
        document.getElementById('depositBtn').addEventListener('click', openDepositModal);
        document.getElementById('withdrawBtn').addEventListener('click', openWithdrawModal);
        document.getElementById('closeDepositModalBtn').addEventListener('click', closeDepositModal);
        document.getElementById('closeWithdrawModalBtn').addEventListener('click', closeWithdrawModal);
        
        // Double-click on info bar to toggle test mode +3h
        document.getElementById('testInfoBar').addEventListener('dblclick', () => {
            if (testOffsetHours === 0) setTestOffset(3);
            else setTestOffset(0);
            // Force UI refresh maybe just show toast
        });
        
        // Dark mode
        const darkToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('darkMode') === null) localStorage.setItem('darkMode', 'true');
        function applyDarkMode() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) { document.body.classList.remove('light'); darkToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode'; }
            else { document.body.classList.add('light'); darkToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode'; }
        }
        darkToggle.addEventListener('click', () => { const currentlyDark = localStorage.getItem('darkMode') === 'true'; localStorage.setItem('darkMode', currentlyDark ? 'false' : 'true'); applyDarkMode(); });
        applyDarkMode();
        
        loadTestMode();
        loadData();
    </script>
</body>
</html>
